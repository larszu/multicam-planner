name: Build Desktop Apps

# Triggers a fresh Windows + macOS build whenever a GitHub release is published.
# Artifacts (NSIS installer, portable .exe, DMG, ZIP) are uploaded directly to
# the release page so users don't need to run electron-builder locally.
#
# The same workflow can be triggered manually (workflow_dispatch) for testing;
# in that case the binaries are kept as workflow artifacts instead of being
# attached to a release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach artifacts to (leave blank for workflow artifacts only)'
        required: false
        default: ''

permissions:
  contents: write

# Opt the @v4-pinned actions in this file (softprops/action-gh-release, upload-artifact)
# into the Node 24 runtime ahead of the June 2nd, 2026 forced cutover, so the
# deprecation warning doesn't keep firing on every run.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifacts: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
          - os: macos-latest
            script: dist:mac
            artifacts: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync package.json version with the release tag
        # electron-builder names artifacts (e.g. "MultiCam Planner Setup X.Y.Z.exe")
        # using the version field in package.json — NOT the git tag. Without this
        # step a release tagged v0.4.1 still produces "Setup 0.4.0.exe" if the
        # last committed package.json was 0.4.0.
        #
        # Resolves the version source in this priority order:
        #   1. release event              → github.event.release.tag_name
        #   2. workflow_dispatch with tag → inputs.tag
        #   3. workflow_dispatch w/o tag  → keep package.json as-is (manual test)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW="${{ github.event.release.tag_name }}"
          else
            RAW="${{ inputs.tag }}"
          fi
          if [ -n "$RAW" ]; then
            VERSION="${RAW#v}"
            echo "Setting package.json version to $VERSION (from tag $RAW)"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          else
            echo "No tag supplied — keeping package.json version $(node -p "require('./package.json').version")"
          fi

      - name: Build distributable
        run: npm run ${{ matrix.script }}
        env:
          # Open-source project — no Apple / Authenticode signing certs available.
          # Disable signing instead of failing the build; the artifact will trigger
          # the usual SmartScreen / Gatekeeper warning on first launch, which the
          # README explains how to dismiss.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Token is only needed if electron-builder publishes itself. We pass
          # --publish never in the scripts, but the token is still useful for
          # GitHub-aware update checks during the build.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: false

      - name: Attach artifacts to release (manual run with tag)
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: false

      - name: Upload as workflow artifacts (manual run without tag)
        if: github.event_name == 'workflow_dispatch' && inputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: multicam-planner-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: warn
          retention-days: 14
