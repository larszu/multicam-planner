<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="geometricPrecision">
  <!-- ─────────────────────────────────────────────────────────
       MultiCam Planner app icon (v2 — legible down to 16px)
       Bold white camera body with a big tri-colour lens. The red /
       green / blue iris echoes the app's multi-camera colours, so it
       reads as "multicam" while still being unmistakably a camera at
       installer / taskbar sizes.
       ───────────────────────────────────────────────────────── -->
  <defs>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="48%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8eef9"/>
    </linearGradient>
  </defs>

  <!-- Brand tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#tile)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#glow)"/>

  <!-- Soft drop shadow under the camera body -->
  <rect x="176" y="404" width="672" height="384" rx="76" fill="#0b1220" opacity="0.22"/>

  <!-- Viewfinder / prism hump -->
  <rect x="312" y="312" width="224" height="104" rx="24" fill="url(#bodyG)"/>
  <!-- Camera body -->
  <rect x="176" y="392" width="672" height="384" rx="72" fill="url(#bodyG)"/>

  <!-- Record dot (brand red) -->
  <circle cx="752" cy="456" r="28" fill="#ef4444"/>

  <!-- ── Lens ── centred at (512, 580) -->
  <!-- Barrel -->
  <circle cx="512" cy="580" r="178" fill="#0b1220"/>
  <circle cx="512" cy="580" r="150" fill="none" stroke="#334155" stroke-width="12"/>
  <!-- Tri-colour iris (R / G / B = the app's camera colours) -->
  <path d="M512 580 L512 460 A120 120 0 0 1 615.9 640 Z" fill="#ef4444"/>
  <path d="M512 580 L615.9 640 A120 120 0 0 1 408.1 640 Z" fill="#22c55e"/>
  <path d="M512 580 L408.1 640 A120 120 0 0 1 512 460 Z" fill="#3b82f6"/>
  <!-- Hub + catch-light -->
  <circle cx="512" cy="580" r="44" fill="#0b1220"/>
  <circle cx="468" cy="528" r="30" fill="#ffffff" opacity="0.9"/>
  <circle cx="556" cy="556" r="12" fill="#ffffff" opacity="0.6"/>

  <!-- Bezel highlight -->
  <rect x="0" y="0" width="1024" height="1024" rx="224"
        fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="8"/>
</svg>
